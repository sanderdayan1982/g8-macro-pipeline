name: ACM Validate US

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install numpy pandas xlrd openpyxl

      - name: ACM validation vs NY Fed (regression guard)
        run: python scripts/acm_g8.py --validate-us

      - name: ACM full run — all currencies
        if: always()
        run: python scripts/acm_g8.py USD EUR JPY GBP CAD AUD
